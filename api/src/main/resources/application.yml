server:
  port: 8080

# ---- H2: JPA metadata (unchanged) ----
spring:
  datasource:
    url: jdbc:h2:file:./data/bi_meta;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

# ---- DuckDB: data tables (JdbcTemplate) ----
duckdb:
  url: jdbc:duckdb:./data/bi_data.duckdb

bi:
  query:
    timeout-seconds: 60
    max-rows-per-query: 100000
  upload-dir: ./data/uploads
