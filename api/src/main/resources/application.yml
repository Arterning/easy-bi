server:
  port: 8080

spring:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  profiles:
    active: dev

duckdb:
  driver: org.duckdb.DuckDBDriver

bi:
  query:
    timeout-seconds: 60
    max-rows-per-query: 100000

ai:
  llm:
    base-url: https://api.deepseek.com/v1
    api-key: ${DEEPSEEK_API_KEY:}
    model: deepseek-chat
    max-tokens: 4096
    temperature: 0.1
  agent:
    max-rounds: 10
